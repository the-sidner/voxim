<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Atlas — Inspector</title>
  <style>
    :root {
      --bg:        #0e0f12;
      --panel:    #1a1c21;
      --border:   #2a2d35;
      --text:     #e6e7ea;
      --text-dim: #9097a3;
      --accent:   #5fb4ff;
      --warn:     #ffb060;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 13px;
    }
    body {
      display: grid;
      grid-template-columns: 1fr 280px;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }
    header {
      grid-column: 1 / -1;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px;
    }
    header h1 { font-size: 14px; font-weight: 600; }
    header .meta { color: var(--text-dim); font-size: 12px; }
    header .crumbs a {
      color: var(--accent); text-decoration: none; cursor: pointer;
    }
    header .crumbs a:hover { text-decoration: underline; }
    header .crumbs .sep { color: var(--text-dim); margin: 0 8px; }
    main {
      position: relative;
      overflow: hidden;
      background: #06070a;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }
    aside {
      border-left: 1px solid var(--border);
      padding: 14px;
      overflow-y: auto;
    }
    aside h2 {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    aside section { margin-bottom: 18px; }
    .row {
      display: flex; align-items: center;
      gap: 8px; margin-bottom: 6px;
    }
    .row label { color: var(--text-dim); flex: 1; }
    .row input[type=number] {
      width: 70px;
      background: #0e0f12;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 3px 6px;
      font: inherit;
      border-radius: 3px;
    }
    button {
      width: 100%;
      padding: 5px 10px;
      background: #1a1c21;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 3px;
      font: inherit;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); color: var(--accent); }
    .selected dl, .info dl {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 4px 8px;
    }
    .selected dt, .info dt { color: var(--text-dim); }
    .legend {
      display: grid; grid-template-columns: 1fr 1fr; gap: 4px 8px;
      font-size: 11px;
    }
    .legend .swatch {
      display: inline-block; width: 10px; height: 10px;
      vertical-align: middle; margin-right: 6px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Atlas</h1>
    <div class="crumbs" id="crumbs"></div>
    <span class="meta" id="meta">—</span>
  </header>
  <main><canvas id="canvas"></canvas></main>
  <aside id="aside"></aside>
  <script type="module" src="/inspector.js"></script>
</body>
</html>
