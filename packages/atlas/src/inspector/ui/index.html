<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Atlas — World Inspector</title>
  <style>
    :root {
      --bg:        #0e0f12;
      --panel:    #1a1c21;
      --border:   #2a2d35;
      --text:     #e6e7ea;
      --text-dim: #9097a3;
      --accent:   #5fb4ff;
      --warn:     #ffb060;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 13px;
    }
    body {
      display: grid;
      grid-template-columns: 1fr 280px;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }
    header {
      grid-column: 1 / -1;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px;
    }
    header h1 { font-size: 14px; font-weight: 600; }
    header .meta { color: var(--text-dim); font-size: 12px; }
    main {
      position: relative;
      overflow: hidden;
      background: #06070a;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    aside {
      border-left: 1px solid var(--border);
      padding: 14px;
      overflow-y: auto;
    }
    aside h2 {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    aside section { margin-bottom: 18px; }
    .row {
      display: flex; align-items: center;
      gap: 8px; margin-bottom: 6px;
    }
    .row label { color: var(--text-dim); flex: 1; }
    .row input[type=number] {
      width: 70px;
      background: #0e0f12;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 3px 6px;
      font: inherit;
      border-radius: 3px;
    }
    button {
      width: 100%;
      padding: 5px 10px;
      background: #1a1c21;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 3px;
      font: inherit;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); color: var(--accent); }
    .selected dl {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 4px 8px;
    }
    .selected dt { color: var(--text-dim); }
    .selected dd { color: var(--text); }
    .legend {
      display: grid; grid-template-columns: 1fr 1fr; gap: 4px 8px;
      font-size: 11px;
    }
    .legend .swatch {
      display: inline-block; width: 10px; height: 10px;
      vertical-align: middle; margin-right: 6px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Atlas — World Inspector</h1>
    <span class="meta" id="meta">—</span>
  </header>
  <main><canvas id="canvas"></canvas></main>
  <aside>
    <section>
      <h2>Regenerate</h2>
      <div class="row"><label for="seed">Seed</label><input id="seed" type="number" value="1"></div>
      <div class="row"><label for="width">Width</label><input id="width" type="number" value="4"></div>
      <div class="row"><label for="height">Height</label><input id="height" type="number" value="4"></div>
      <button id="regen">Regenerate worldmap</button>
    </section>
    <section>
      <h2>Channels → colour</h2>
      <div class="legend">
        <div><span class="swatch" style="background:#ff4040"></span>R = temperature</div>
        <div><span class="swatch" style="background:#40ff40"></span>G = moisture</div>
        <div><span class="swatch" style="background:#4080ff"></span>B = altitude</div>
        <div><span class="swatch" style="background:#fff;border:1px solid #444"></span>· = gate</div>
      </div>
    </section>
    <section class="selected">
      <h2>Selected cell</h2>
      <div id="selected">click a cell</div>
    </section>
  </aside>
  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const meta = document.getElementById("meta");
    const selectedEl = document.getElementById("selected");
    const seedInput   = document.getElementById("seed");
    const widthInput  = document.getElementById("width");
    const heightInput = document.getElementById("height");
    document.getElementById("regen").addEventListener("click", regen);
    canvas.addEventListener("click", onCanvasClick);
    addEventListener("resize", () => { resize(); draw(); });

    let world = null;     // { seed, cells: [...] }
    let bbox  = null;     // { minX, minY, maxX, maxY }
    let layout = null;    // { cellPx, originX, originY }
    let selected = null;  // { x, y } cell coord

    async function load() {
      const res = await fetch("/world");
      world = await res.json();
      if (world.cells.length === 0) {
        meta.textContent = "no worldmap";
        return;
      }
      bbox = world.cells.reduce((acc, c) => ({
        minX: Math.min(acc.minX, c.cellX), minY: Math.min(acc.minY, c.cellY),
        maxX: Math.max(acc.maxX, c.cellX), maxY: Math.max(acc.maxY, c.cellY),
      }), { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity });
      seedInput.value   = world.seed ?? 1;
      widthInput.value  = bbox.maxX - bbox.minX + 1;
      heightInput.value = bbox.maxY - bbox.minY + 1;
      meta.textContent = `seed ${world.seed} · ${world.cells.length} cells · ${widthInput.value}×${heightInput.value}`;
      resize();
      draw();
    }

    async function regen() {
      const seed   = parseInt(seedInput.value);
      const width  = parseInt(widthInput.value);
      const height = parseInt(heightInput.value);
      meta.textContent = "regenerating…";
      await fetch(`/world/regen?seed=${seed}&width=${width}&height=${height}`, { method: "POST" });
      selected = null; selectedEl.textContent = "click a cell";
      await load();
    }

    function resize() {
      canvas.width  = canvas.clientWidth  * devicePixelRatio;
      canvas.height = canvas.clientHeight * devicePixelRatio;
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }

    function computeLayout() {
      if (!world || world.cells.length === 0) return null;
      const w = bbox.maxX - bbox.minX + 1;
      const h = bbox.maxY - bbox.minY + 1;
      const margin = 24;
      const availW = canvas.clientWidth  - 2 * margin;
      const availH = canvas.clientHeight - 2 * margin;
      const cellPx = Math.floor(Math.min(availW / w, availH / h));
      const originX = margin + (availW - cellPx * w) / 2;
      const originY = margin + (availH - cellPx * h) / 2;
      return { cellPx, originX, originY };
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight);
      if (!world || world.cells.length === 0) return;
      layout = computeLayout();
      if (!layout) return;
      for (const c of world.cells) drawCell(c);
      if (selected) drawSelection();
    }

    function drawCell(c) {
      const { cellPx, originX, originY } = layout;
      const x = originX + (c.cellX - bbox.minX) * cellPx;
      const y = originY + (c.cellY - bbox.minY) * cellPx;
      const r = Math.round(c.biome.temperature * 255);
      const g = Math.round(c.biome.moisture    * 255);
      const b = Math.round(c.biome.altitude    * 255);
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(x, y, cellPx - 1, cellPx - 1);

      // Gates: small white dot at the offset position on each edge.
      ctx.fillStyle = "#fff";
      const dotR = Math.max(2, Math.round(cellPx * 0.04));
      const tile = 512; // matches TILE_WORLD_SIZE in atlas worldmap/generate.ts
      for (const edge of ["north", "east", "south", "west"]) {
        const g = c.gates[edge];
        if (!g) continue;
        const along = g.offset / tile * cellPx;
        let gx, gy;
        if (edge === "north") { gx = x + along;     gy = y; }
        if (edge === "south") { gx = x + along;     gy = y + cellPx - 1; }
        if (edge === "west")  { gx = x;             gy = y + along; }
        if (edge === "east")  { gx = x + cellPx - 1; gy = y + along; }
        ctx.beginPath();
        ctx.arc(gx, gy, dotR, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawSelection() {
      const { cellPx, originX, originY } = layout;
      const x = originX + (selected.x - bbox.minX) * cellPx;
      const y = originY + (selected.y - bbox.minY) * cellPx;
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 2;
      ctx.strokeRect(x - 1, y - 1, cellPx + 1, cellPx + 1);
    }

    function onCanvasClick(e) {
      if (!world || !layout) return;
      const rect = canvas.getBoundingClientRect();
      const px = e.clientX - rect.left;
      const py = e.clientY - rect.top;
      const { cellPx, originX, originY } = layout;
      const cx = Math.floor((px - originX) / cellPx) + bbox.minX;
      const cy = Math.floor((py - originY) / cellPx) + bbox.minY;
      const cell = world.cells.find((c) => c.cellX === cx && c.cellY === cy);
      if (!cell) return;
      selected = { x: cx, y: cy };
      renderSelected(cell);
      draw();
    }

    function renderSelected(c) {
      const fmt = (n) => n.toFixed(3);
      const gateRow = (k, g) => g
        ? `<dt>gate ${k}</dt><dd>offset ${fmt(g.offset)} → (${g.toCellX},${g.toCellY})</dd>`
        : `<dt>gate ${k}</dt><dd style="color:var(--text-dim)">—</dd>`;
      selectedEl.innerHTML = `
        <dl>
          <dt>cell</dt><dd>(${c.cellX}, ${c.cellY})</dd>
          <dt>temperature</dt><dd>${fmt(c.biome.temperature)}</dd>
          <dt>moisture</dt><dd>${fmt(c.biome.moisture)}</dd>
          <dt>altitude</dt><dd>${fmt(c.biome.altitude)}</dd>
          <dt>ruggedness</dt><dd>${fmt(c.biome.ruggedness)}</dd>
          ${gateRow("N", c.gates.north)}
          ${gateRow("E", c.gates.east)}
          ${gateRow("S", c.gates.south)}
          ${gateRow("W", c.gates.west)}
        </dl>`;
    }

    load();
  </script>
</body>
</html>
