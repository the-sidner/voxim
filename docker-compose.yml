# Voxim2 — base docker-compose stack.
# Architecture: see ARCHITECTURE.md.

x-tile-base: &tile-base
  build:
    context: .
    dockerfile: docker/tile-server.Dockerfile
  depends_on:
    postgres:
      condition: service_healthy
    migrate:
      condition: service_completed_successfully
    atlas:
      condition: service_started
    certs-init:
      condition: service_completed_successfully
  environment:
    DATABASE_URL: ${DATABASE_URL}
    GATEWAY_URL: ${GATEWAY_URL}
    VOXIM_SERVICE_SECRET: ${VOXIM_SERVICE_SECRET}
    # Macro-grid width — must match what atlas was started with so
    # tile-server can map TILE_ID → (cellX, cellY) for atlas lookup.
    WORLD_WIDTH: ${WORLD_WIDTH:-2}
  volumes:
    - voxim-certs:/app/certs:ro
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: voxim
      POSTGRES_USER: voxim
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - voxim-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voxim -d voxim"]
      interval: 2s
      timeout: 2s
      retries: 30

  certs-init:
    build:
      context: .
      dockerfile: docker/certs-init.Dockerfile
    volumes:
      - voxim-certs:/out
    # One-shot: generates certs into /out only if /out/cert.pem is absent.

  migrate:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    command: ["deno", "run", "--allow-net", "--allow-read", "--allow-env",
              "packages/db/migrate.ts"]
    restart: "no"
    # Auto-runs on every compose-up. Migrations are forward-only and idempotent
    # (skip already-applied), so re-running is cheap. Other services depend on
    # this with condition: service_completed_successfully so they wait until the
    # schema is current before booting.
    #
    # Manual invocation (rare — for forcing a re-run without restarting the
    # stack): `deno task migrate`.

  gateway:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      certs-init:
        condition: service_completed_successfully
    environment:
      ADMIN_PORT: 8081
      WT_PORT: 8080
      DATABASE_URL: ${DATABASE_URL}
      VOXIM_SERVICE_SECRET: ${VOXIM_SERVICE_SECRET}
      TLS_CERT: /app/certs/cert.pem
      TLS_KEY: /app/certs/key.pem
    ports:
      # 8081 — plain HTTP for account/handshake/register/handoff/internal
      - "8081:8081"
      # 8080/udp — WebTransport service streams: tile + coordinator
      # privileged links (T-137).
      - "8080:8080/udp"
    volumes:
      - voxim-certs:/app/certs:ro
    restart: unless-stopped

  coordinator:
    build:
      context: .
      dockerfile: docker/coordinator.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      gateway:
        condition: service_started
      certs-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
      GATEWAY_WT_URL: ${GATEWAY_WT_URL:-https://gateway:8080}
      VOXIM_SERVICE_SECRET: ${VOXIM_SERVICE_SECRET}
      TLS_CERT: /app/certs/cert.pem
      TICK_RATE: ${COORDINATOR_TICK_RATE:-1}
      WORLD_SEED: ${WORLD_SEED:-1}
      WORLD_TILES: ${WORLD_TILES:-tile_0,tile_1,tile_2,tile_3}
      WORLD_WIDTH: ${WORLD_WIDTH:-2}
      WORLD_HEIGHT: ${WORLD_HEIGHT:-2}
    volumes:
      - voxim-certs:/app/certs:ro
    restart: unless-stopped

  atlas:
    build:
      context: .
      dockerfile: docker/atlas.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      ATLAS_PORT: 8082
      DATABASE_URL: ${DATABASE_URL}
      # Aligned with the coordinator's defaults so atlas generates a worldmap
      # of the same dimensions the rest of the stack expects.
      WORLD_SEED:   ${WORLD_SEED:-1}
      WORLD_WIDTH:  ${WORLD_WIDTH:-2}
      WORLD_HEIGHT: ${WORLD_HEIGHT:-2}
    ports:
      # 8082 — HTTP for /health, /world, /world/cell/*, /world/regen, inspector UI.
      - "8082:8082"
    restart: unless-stopped

  tile-1:
    <<: *tile-base
    hostname: tile-1
    environment:
      DATABASE_URL: ${DATABASE_URL}
      GATEWAY_URL: ${GATEWAY_URL}
      GATEWAY_WT_URL: ${GATEWAY_WT_URL:-https://gateway:8080}
      VOXIM_SERVICE_SECRET: ${VOXIM_SERVICE_SECRET}
      TILE_ID: tile_0
      TILE_ADDRESS: ${HOST_ADDR:-127.0.0.1}:4433
      ADMIN_PORT: 14433
      PORT: 4433
      TLS_CERT: /app/certs/cert.pem
      TLS_KEY: /app/certs/key.pem
    ports:
      - "4433:4433/udp"
      - "14433:14433"

  tile-2:
    <<: *tile-base
    hostname: tile-2
    profiles: ["scale"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      GATEWAY_URL: ${GATEWAY_URL}
      GATEWAY_WT_URL: ${GATEWAY_WT_URL:-https://gateway:8080}
      VOXIM_SERVICE_SECRET: ${VOXIM_SERVICE_SECRET}
      TILE_ID: tile_1
      TILE_ADDRESS: ${HOST_ADDR:-127.0.0.1}:4434
      ADMIN_PORT: 14434
      PORT: 4433
      TLS_CERT: /app/certs/cert.pem
      TLS_KEY: /app/certs/key.pem
    ports:
      - "4434:4433/udp"
      - "14434:14434"

  tile-3:
    <<: *tile-base
    hostname: tile-3
    profiles: ["scale"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      GATEWAY_URL: ${GATEWAY_URL}
      GATEWAY_WT_URL: ${GATEWAY_WT_URL:-https://gateway:8080}
      VOXIM_SERVICE_SECRET: ${VOXIM_SERVICE_SECRET}
      TILE_ID: tile_2
      TILE_ADDRESS: ${HOST_ADDR:-127.0.0.1}:4435
      ADMIN_PORT: 14435
      PORT: 4433
      TLS_CERT: /app/certs/cert.pem
      TLS_KEY: /app/certs/key.pem
    ports:
      - "4435:4433/udp"
      - "14435:14435"

  tile-4:
    <<: *tile-base
    hostname: tile-4
    profiles: ["scale"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      GATEWAY_URL: ${GATEWAY_URL}
      GATEWAY_WT_URL: ${GATEWAY_WT_URL:-https://gateway:8080}
      VOXIM_SERVICE_SECRET: ${VOXIM_SERVICE_SECRET}
      TILE_ID: tile_3
      TILE_ADDRESS: ${HOST_ADDR:-127.0.0.1}:4436
      ADMIN_PORT: 14436
      PORT: 4433
      TLS_CERT: /app/certs/cert.pem
      TLS_KEY: /app/certs/key.pem
    ports:
      - "4436:4433/udp"
      - "14436:14436"

  client-dev:
    build:
      context: .
      dockerfile: docker/client-dev.Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  voxim-pg-data:
  voxim-certs:
